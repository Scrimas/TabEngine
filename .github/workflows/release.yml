name: Release Build

on:
  push:
    tags:
      - "v*" # Triggers the workflow when you push a version tag like v1.0.0
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  release:
    permissions:
      contents: write # Crucial for allowing the action to create a GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
          - platform: "macos-latest"
          - platform: "ubuntu-22.04" # Best compatibility for building Linux AppImages

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets required for building universal macOS binaries if on a Mac runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and Package App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TabEngine v__VERSION__"
          releaseBody: "Automated release binaries for TabEngine. See assets below."
          releaseDraft: true
          prerelease: false
