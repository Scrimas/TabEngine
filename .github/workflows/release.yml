name: Release Build

on:
  push:
    tags:
      - "v*" # Triggers the workflow when you push a version tag like v1.0.0
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  release:
    permissions:
      contents: write # Crucial for allowing the action to create a GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
          - platform: "macos-latest"
          - platform: "ubuntu-24.04" # Best compatibility for building Linux AppImages

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets required for building universal macOS binaries if on a Mac runner
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            squashfs-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio

      - name: Install npm dependencies
        run: npm ci

      - name: Build and Package App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TabEngine v__VERSION__"
          releaseBody: "Automated release binaries for TabEngine. See assets below."
          releaseDraft: true
          prerelease: false

      # linuxdeploy bundles its own (runner-era) libwayland-client/cursor/egl/server
      # into the AppImage. Its AppRun prepends the bundle to LD_LIBRARY_PATH, shadowing the
      # host's libs — on newer Wayland compositors this breaks WebKitGTK's EGL init
      # (EGL_BAD_PARAMETER, WebKitWebProcess aborts). Every desktop capable of running
      # webkit2gtk-4.1 already ships compatible wayland libs system-wide, so stripping the
      # bundled copies and repacking is safe and lets the AppImage fall through to the host.
      #
      # NOTE on the runner choice: this job must run on ubuntu-24.04 or newer, and
      # libfreetype must NOT be bundled (linuxdeploy rightly excludes it). The bundled
      # WebKit's Skia is compiled against the runner's FreeType headers but runs against
      # the host's libfreetype, and FreeType's COLRv1 color-font API had an ABI break
      # before stabilizing in 2.13.0. Building on 22.04 (FreeType 2.11) made Skia index
      # COLRv1 color stops out of bounds on any host with FreeType >= 2.13 and a COLRv1
      # emoji font — a glibcxx assertion abort in colrv1_configure_skpaint (#5). Bundling
      # the 22.04 libfreetype instead broke font loading wholesale (blank alphaTab score,
      # runaway WebProcess). 24.04's FreeType 2.13.2 headers are post-stabilization and
      # ABI-compatible with current hosts, so no freetype hack is needed at all.
      - name: Fix bundled library set in AppImage
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-server.so.0
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          rm -f "$APPIMAGE"
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Re-upload patched AppImage to draft release
        if: matrix.platform == 'ubuntu-24.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          gh release upload "${{ github.ref_name }}" "$APPIMAGE" --clobber --repo "${{ github.repository }}"
